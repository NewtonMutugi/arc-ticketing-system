  #     - rails_storage:/rails/storage

  db:
    image: postgres:16-alpine
    container_name: arc_events_system-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: arc_events_production
    volumes:
      # PERSISTENCE: Keep database data safe across restarts
      - postgres_data:/var/lib/postgresql/data
    # Healthcheck ensures Rails doesn't try to boot before DB is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rails_storage:
